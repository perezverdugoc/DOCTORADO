document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 border-box; margin: 0; padding: 0; }\n\n  html, body {\n    background: var(--bg-page);\n    color: var(--text-primary);\n    font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n    font-weight: 500;\n    font-feature-settings: \"ss01\", \"cv11\";\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    min-height: 100vh;\n  }\n\n  body {\n    padding: 32px 24px 48px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n  }\n\n  /* ─── Header ─────────────────────────────────────────── */\n  header.page-head {\n    width: 100%;\n    max-width: 1100px;\n    margin: 0 auto 24px;\n    padding: 0 4px;\n  }\n  .eyebrow {\n    font-size: 11px;\n    font-weight: 600;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--mandy-700);\n    margin-bottom: 10px;\n  }\n  h1.title {\n    font-size: clamp(22px, 2.4vw, 30px);\n    font-weight: 600;\n    letter-spacing: -0.015em;\n    line-height: 1.15;\n    color: var(--text-primary);\n    margin-bottom: 6px;\n  }\n  h1.title em {\n    font-style: normal;\n    color: var(--mandy-600);\n  }\n  .subtitle {\n    font-size: 14px;\n    font-weight: 400;\n    color: var(--text-secondary);\n    max-width: 720px;\n    line-height: 1.5;\n  }\n\n  /* ─── Map shell ──────────────────────────────────────── */\n  #wrap {\n    position: relative;\n    width: 100%;\n    max-width: 1100px;\n    background: var(--bg-surface);\n    border: 1px solid var(--border-soft);\n    border-radius: var(--radius-lg);\n    overflow: hidden;\n    box-shadow: var(--shadow-md);\n  }\n\n  #map { position: relative; background: var(--bg-map-water); }\n  #map svg { width: 100%; display: block; cursor: grab; }\n  #map svg.grabbing { cursor: grabbing; }\n\n  .grat { fill: none; stroke: rgba(28,28,28,0.04); stroke-width: 0.4; }\n  .map-land { fill: var(--bg-map-land); stroke: var(--bg-map-water); stroke-width: 0.6; }\n  .map-sphere { fill: var(--bg-map-water); }\n\n  /* ─── Pin styles ─────────────────────────────────────── */\n  .pin-g {\n    cursor: pointer;\n    transition: opacity 240ms var(--ease), transform 180ms var(--ease);\n    transform-box: fill-box;\n    transform-origin: center bottom;\n    transform: scale(var(--pin-scale, 1));\n  }\n  .pin-g .pb {\n    transition: filter 200ms var(--ease);\n    vector-effect: non-scaling-stroke;\n  }\n  .pin-g:hover { transform: translateY(-2px) scale(var(--pin-hover-scale, 1.08)); }\n  .pin-g:hover .pb { filter: drop-shadow(0 4px 6px rgba(28,28,28,0.25)); }\n  .pin-g.dim { opacity: 0; pointer-events: none; transform: scale(var(--pin-dim-scale, 0.6)); }\n\n  .pin-c .pb { fill: var(--color-convenio); stroke: var(--pure-white); stroke-width: 1.4; }\n  .pin-c .pdot { fill: var(--pure-white); }\n  .pin-p .pb { fill: var(--color-pasantia); stroke: var(--pure-white); stroke-width: 1.4; }\n  .pin-p .pdot { fill: var(--pure-white); }\n\n  /* When an institution has BOTH (convenio + pasantía) we draw it as convenio\n     with a thin sunset ring */\n  .pin-both .pb { fill: var(--color-convenio); stroke: var(--color-pasantia); stroke-width: 2; }\n\n  /* Country cluster halo */\n  .halo {\n    fill: var(--mandy-500);\n    opacity: 0.10;\n    pointer-events: none;\n    transition: opacity 240ms var(--ease);\n  }\n  .halo.dim { opacity: 0; }\n\n  /* ─── Tooltip ────────────────────────────────────────── */\n  #tt {\n    position: absolute;\n    display: none;\n    background: var(--bg-surface);\n    border: 1px solid var(--border-medium);\n    border-radius: var(--radius-md);\n    padding: 12px 14px;\n    pointer-events: none;\n    z-index: 30;\n    max-width: 260px;\n    min-width: 180px;\n    box-shadow: var(--shadow-lg);\n    font-size: 13px;\n  }\n  #tt .tn {\n    font-weight: 600;\n    color: var(--text-primary);\n    line-height: 1.3;\n    margin-bottom: 3px;\n    font-size: 13.5px;\n    letter-spacing: -0.005em;\n  }\n  #tt .tc {\n    color: var(--text-tertiary);\n    font-size: 11px;\n    font-weight: 500;\n    text-transform: uppercase;\n    letter-spacing: 0.08em;\n    margin-bottom: 9px;\n  }\n  #tt .tgs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }\n  .tag {\n    font-size: 10.5px;\n    font-weight: 600;\n    padding: 3px 9px;\n    border-radius: var(--radius-pill);\n    letter-spacing: 0.02em;\n  }\n  .tag-c { background: var(--mandy-100); color: var(--mandy-800); }\n  .tag-p { background: #FFE5E1; color: var(--sunset-700); }\n  #tt .tl {\n    font-size: 12px;\n    color: var(--mandy-600);\n    text-decoration: none;\n    font-weight: 500;\n    display: inline-flex;\n    align-items: center;\n    gap: 4px;\n  }\n  #tt .tl:hover { color: var(--mandy-800); }\n\n  /* ─── Top-right zoom controls ────────────────────────── */\n  #zoom-ctrls {\n    position: absolute;\n    top: 14px;\n    right: 14px;\n    display: flex;\n    flex-direction: column;\n    gap: 4px;\n    z-index: 10;\n  }\n  .zb {\n    width: 34px;\n    height: 34px;\n    background: var(--bg-surface);\n    border: 1px solid var(--border-soft);\n    border-radius: var(--radius-sm);\n    cursor: pointer;\n    font-family: inherit;\n    font-size: 13px;\n    font-weight: 600;\n    color: var(--text-primary);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    box-shadow: var(--shadow-sm);\n    transition: background 160ms var(--ease), color 160ms var(--ease), border-color 160ms var(--ease);\n  }\n  .zb:hover { background: var(--mandy-50); color: var(--mandy-700); border-color: var(--mandy-200); }\n  .zb-region {\n    width: 34px;\n    font-size: 10px;\n    font-weight: 700;\n    letter-spacing: 0.08em;\n    color: var(--mandy-600);\n  }\n  #zoom-divider { height: 6px; }\n\n  /* ─── Bottom-left filter / legend bar ────────────────── */\n  .bottom-bar {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 16px;\n    padding: 14px 18px;\n    border-top: 1px solid var(--border-soft);\n    background: var(--bg-surface);\n    flex-wrap: wrap;\n  }\n\n  .filter-group {\n    display: flex;\n    gap: 8px;\n    align-items: center;\n  }\n  .filter-label {\n    font-size: 10.5px;\n    font-weight: 600;\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    color: var(--text-tertiary);\n    margin-right: 4px;\n  }\n  .fbtn {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    padding: 7px 13px 7px 10px;\n    background: var(--pure-white);\n    border: 1.5px solid var(--border-medium);\n    border-radius: var(--radius-pill);\n    font-family: inherit;\n    font-size: 12.5px;\n    font-weight: 500;\n    color: var(--text-secondary);\n    cursor: pointer;\n    transition: all 200ms var(--ease);\n    user-select: none;\n  }\n  .fbtn:hover { border-color: var(--text-primary); color: var(--text-primary); }\n  .fbtn .fdot {\n    width: 10px; height: 10px;\n    border-radius: 50%;\n    display: inline-block;\n    flex-shrink: 0;\n  }\n  .fbtn[data-kind=\"c\"] .fdot { background: var(--color-convenio); }\n  .fbtn[data-kind=\"p\"] .fdot { background: var(--color-pasantia); }\n  .fbtn .fcount {\n    font-size: 11px;\n    font-weight: 600;\n    color: var(--text-tertiary);\n    margin-left: 2px;\n  }\n  .fbtn[aria-pressed=\"true\"] {\n    background: var(--text-primary);\n    border-color: var(--text-primary);\n    color: var(--pure-white);\n  }\n  .fbtn[aria-pressed=\"true\"] .fcount { color: rgba(255,255,255,0.65); }\n  .fbtn[aria-pressed=\"true\"][data-kind=\"c\"] {\n    background: var(--mandy-600); border-color: var(--mandy-600);\n  }\n  .fbtn[aria-pressed=\"true\"][data-kind=\"p\"] {\n    background: var(--sunset-600); border-color: var(--sunset-600);\n  }\n\n  .meta {\n    font-size: 11px;\n    color: var(--text-tertiary);\n    font-weight: 500;\n    letter-spacing: 0.04em;\n  }\n  .meta strong {\n    color: var(--text-secondary);\n    font-weight: 600;\n  }\n\n  /* ─── Footer credit ─────────────────────────────────── */\n  footer.page-foot {\n    margin-top: 18px;\n    width: 100%;\n    max-width: 1100px;\n    display: flex;\n    justify-content: space-between;\n    flex-wrap: wrap;\n    gap: 8px;\n    font-size: 11px;\n    color: var(--text-tertiary);\n    font-weight: 500;\n    letter-spacing: 0.04em;\n  }\n  footer.page-foot strong { color: var(--text-secondary); font-weight: 600; }\n\n  /* ─── Hint chip ─────────────────────────────────────── */\n  #hint {\n    position: absolute;\n    bottom: 14px;\n    left: 50%;\n    transform: translateX(-50%);\n    background: rgba(28,28,28,0.78);\n    color: rgba(255,255,255,0.92);\n    font-size: 11px;\n    font-weight: 500;\n    padding: 5px 12px;\n    border-radius: var(--radius-pill);\n    pointer-events: none;\n    z-index: 12;\n    transition: opacity 1.2s var(--ease);\n    letter-spacing: 0.02em;\n  }\n  #hint.hide { opacity: 0; }\n\n  /* ─── Country list panel (right) ─────────────────────── */\n  .stats-strip {\n    width: 100%;\n    max-width: 1100px;\n    margin: 18px auto 0;\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 10px;\n  }\n  .stat {\n    background: var(--bg-surface);\n    border: 1px solid var(--border-soft);\n    border-radius: var(--radius-md);\n    padding: 14px 16px;\n  }\n  .stat .lbl {\n    font-size: 10.5px;\n    font-weight: 600;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--text-tertiary);\n    margin-bottom: 6px;\n  }\n  .stat .val {\n    font-size: 22px;\n    font-weight: 600;\n    letter-spacing: -0.02em;\n    color: var(--text-primary);\n  }\n  .stat .val .accent { color: var(--mandy-600); }\n\n  /* ─── Listado desplegable de instituciones ──────────── */\n  .list-section {\n    width: 100%;\n    max-width: 1100px;\n    margin: 28px auto 0;\n    background: var(--bg-surface);\n    border: 1px solid var(--border-soft);\n    border-radius: var(--radius-lg);\n    padding: 22px 24px 24px;\n  }\n  .list-head { margin-bottom: 18px; }\n  .list-title {\n    font-size: 17px;\n    font-weight: 600;\n    letter-spacing: -0.01em;\n    color: var(--text-primary);\n    margin-bottom: 4px;\n  }\n  .list-sub {\n    font-size: 12.5px;\n    font-weight: 400;\n    color: var(--text-secondary);\n  }\n  .inst-list {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));\n    gap: 22px 28px;\n  }\n  .country-block { break-inside: avoid; }\n  .country-name {\n    font-size: 11px;\n    font-weight: 700;\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    color: var(--mandy-700);\n    border-bottom: 1px solid var(--mandy-100);\n    padding-bottom: 6px;\n    margin-bottom: 8px;\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n  }\n  .cn-count {\n    font-size: 10px;\n    font-weight: 600;\n    color: var(--text-tertiary);\n    background: var(--pearlbush-100);\n    padding: 2px 7px;\n    border-radius: var(--radius-pill);\n    letter-spacing: 0.04em;\n  }\n  .inst-ul { list-style: none; }\n  .inst-li {\n    padding: 6px 0;\n    border-bottom: 1px dashed var(--border-soft);\n    display: flex;\n    flex-direction: column;\n    gap: 4px;\n  }\n  .inst-li:last-child { border-bottom: none; }\n  .inst-link {\n    color: var(--text-primary);\n    text-decoration: none;\n    font-size: 13px;\n    font-weight: 500;\n    line-height: 1.35;\n    transition: color 160ms var(--ease);\n  }\n  .inst-link:hover { color: var(--mandy-700); text-decoration: underline; }\n  .inst-tags { display: flex; gap: 4px; flex-wrap: wrap; }\n  .empty {\n    grid-column: 1 / -1;\n    text-align: center;\n    padding: 32px;\n    color: var(--text-tertiary);\n    font-size: 13px;\n  }\n\n  @media (max-width: 720px) {\n    body { padding: 18px 12px 32px; }\n    .stats-strip { grid-template-columns: repeat(2, 1fr); }\n    .filter-label { display: none; }\n  }\n<\/style>\n<\/head>\n<body>\n\n<header class=\"page-head\">\n  <div class=\"eyebrow\">Doctorado en Ciencias Sociales · UDP<\/div>\n  <h1 class=\"title\">Mapa de <em>cooperación internacional<\/em><\/h1>\n  <p class=\"subtitle\">Convenios institucionales y pasantías de investigación realizadas por estudiantes en universidades y centros de estudio en el extranjero.<\/p>\n<\/header>\n\n<div id=\"wrap\">\n  <div id=\"map\">\n    <div id=\"zoom-ctrls\" role=\"group\" aria-label=\"Controles de zoom\">\n      <button class=\"zb zb-region\" id=\"btn-eu\" title=\"Centrar en Europa\" aria-label=\"Centrar en Europa\">EU<\/button>\n      <button class=\"zb zb-region\" id=\"btn-na\" title=\"Centrar en América del Norte\" aria-label=\"Centrar en América del Norte\">AN<\/button>\n      <button class=\"zb zb-region\" id=\"btn-sa\" title=\"Centrar en América del Sur\" aria-label=\"Centrar en América del Sur\">AS<\/button>\n      <div id=\"zoom-divider\"><\/div>\n      <button class=\"zb\" id=\"btn-plus\" title=\"Acercar\" aria-label=\"Acercar\">+<\/button>\n      <button class=\"zb\" id=\"btn-minus\" title=\"Alejar\" aria-label=\"Alejar\">−<\/button>\n      <button class=\"zb\" id=\"btn-reset\" title=\"Vista mundial\" aria-label=\"Vista mundial\">↺<\/button>\n    <\/div>\n    <div id=\"hint\">Scroll para hacer zoom · Arrastra para mover<\/div>\n  <\/div>\n\n  <div class=\"bottom-bar\">\n    <div class=\"filter-group\" role=\"group\" aria-label=\"Filtrar por tipo de cooperación\">\n      <span class=\"filter-label\">Mostrar<\/span>\n      <button class=\"fbtn\" data-kind=\"c\" aria-pressed=\"true\">\n        <span class=\"fdot\"><\/span><span>Convenios<\/span><span class=\"fcount\" id=\"count-c\"><\/span>\n      <\/button>\n      <button class=\"fbtn\" data-kind=\"p\" aria-pressed=\"true\">\n        <span class=\"fdot\"><\/span><span>Pasantías<\/span><span class=\"fcount\" id=\"count-p\"><\/span>\n      <\/button>\n    <\/div>\n    <div class=\"meta\">\n      <strong id=\"visible-count\">—<\/strong> instituciones visibles\n    <\/div>\n  <\/div>\n\n  <div id=\"tt\" role=\"tooltip\" aria-live=\"polite\">\n    <div class=\"tn\" id=\"tn\"><\/div>\n    <div class=\"tc\" id=\"tc\"><\/div>\n    <div class=\"tgs\" id=\"tgs\"><\/div>\n    <a class=\"tl\" id=\"tl\" href=\"#\" target=\"_blank\" rel=\"noopener noreferrer\"><\/a>\n  <\/div>\n<\/div>\n\n<div class=\"stats-strip\">\n  <div class=\"stat\">\n    <div class=\"lbl\">Países<\/div>\n    <div class=\"val\" id=\"stat-countries\">—<\/div>\n  <\/div>\n  <div class=\"stat\">\n    <div class=\"lbl\">Convenios<\/div>\n    <div class=\"val\"><span class=\"accent\" id=\"stat-c\">—<\/span><\/div>\n  <\/div>\n  <div class=\"stat\">\n    <div class=\"lbl\">Pasantías<\/div>\n    <div class=\"val\"><span id=\"stat-p\">—<\/span><\/div>\n  <\/div>\n  <div class=\"stat\">\n    <div class=\"lbl\">Total instituciones<\/div>\n    <div class=\"val\" id=\"stat-total\">—<\/div>\n  <\/div>\n<\/div>\n\n<section class=\"list-section\" aria-label=\"Listado de instituciones\">\n  <div class=\"list-head\">\n    <h2 class=\"list-title\">Listado de instituciones<\/h2>\n    <p class=\"list-sub\">Filtrá usando los botones del mapa. El listado refleja la selección activa.<\/p>\n  <\/div>\n  <div id=\"inst-list\" class=\"inst-list\"><\/div>\n<\/section>\n\n<footer class=\"page-foot\">\n  <span>Facultad de Ciencias Sociales e Historia · Universidad Diego Portales<\/span>\n  <span>Actualizado <strong>2026<\/strong><\/span>\n<\/footer>\n\n<script>\n/* ─────────────────────────────────────────────────────────────\n   Loader — fetch d3, topojson, world atlas via standalone-aware\n   __resources map (falls back to live URLs in dev preview).\n   ───────────────────────────────────────────────────────────── */\n(function bootstrap() {\n  const R = (typeof window.__resources === 'object' && window.__resources) || {};\n  const D3_URL       = R.d3lib       || \"https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js\";\n  const TOPO_URL     = R.topojsonlib || \"https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js\";\n  const ATLAS_URL    = R.worldatlas  || \"https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json\";\n\n  function loadScript(src) {\n    return new Promise((res, rej) => {\n      const s = document.createElement('script');\n      s.src = src; s.onload = res; s.onerror = rej;\n      document.head.appendChild(s);\n    });\n  }\n\n  Promise.all([loadScript(D3_URL), loadScript(TOPO_URL)])\n    .then(() => fetch(ATLAS_URL))\n    .then(r => r.json())\n    .then(world => initMap(world))\n    .catch(err => {\n      console.error(err);\n      document.getElementById('map').innerHTML =\n        '<div style=\"padding:40px;text-align:center;color:var(--text-tertiary);font-size:13px\">Error al cargar el mapa.<\/div>';\n    });\n\n  /* ──────────────────────────────────────────────\n     DATABASE — instituciones por país\n     Format: { n: name, c: country, ll: [lon, lat],\n               u: url, k: kinds [c|p|cp] }\n     k: 'c' = solo convenio, 'p' = solo pasantía,\n        'cp' = convenio + pasantía (institución se cuenta en ambos)\n     ────────────────────────────────────────────── */\n  const DATA = [\n    /* ── Alemania ── */\n    { n: \"GIGA – German Institute of Global and Area Studies\", c: \"Alemania\",  ll: [ 9.99, 53.55], u: \"https://www.giga-hamburg.de\", k: \"c\"  },\n    { n: \"Max Planck Institute for the Study of Societies\",    c: \"Alemania\",  ll: [ 6.96, 50.93], u: \"https://www.mpifg.de\",        k: \"cp\" },\n    { n: \"Universidad de Hildesheim\",                          c: \"Alemania\",  ll: [ 9.95, 52.15], u: \"https://www.uni-hildesheim.de\", k: \"cp\" },\n    { n: \"Universidad Libre de Berlín\",                        c: \"Alemania\",  ll: [13.40, 52.50], u: \"https://www.fu-berlin.de\",   k: \"c\"  },\n\n    /* ── Argentina ── */\n    { n: \"Universidad de San Andrés\",                          c: \"Argentina\", ll: [-58.55, -34.46], u: \"https://www.udesa.edu.ar\", k: \"c\"  },\n    { n: \"Universidad Nacional de San Martín (UNSAM)\",         c: \"Argentina\", ll: [-58.53, -34.57], u: \"https://www.unsam.edu.ar\", k: \"c\"  },\n    { n: \"Universidad Torcuato Di Tella (UTDT)\",               c: \"Argentina\", ll: [-58.42, -34.55], u: \"https://www.utdt.edu\",     k: \"c\"  },\n\n    /* ── Brasil ── */\n    { n: \"Universidade de São Paulo (USP)\",                    c: \"Brasil\",    ll: [-46.73, -23.56], u: \"https://www5.usp.br\",       k: \"c\"  },\n    { n: \"Universidad de Brasilia (UnB)\",                      c: \"Brasil\",    ll: [-47.93, -15.78], u: \"https://www.unb.br\",        k: \"c\"  },\n\n    /* ── Canadá ── */\n    { n: \"Universidad de Montreal\",                            c: \"Canadá\",    ll: [-73.62,  45.50], u: \"https://www.umontreal.ca\",  k: \"c\"  },\n\n    /* ── Colombia ── */\n    { n: \"Universidad del Rosario\",                            c: \"Colombia\",  ll: [-74.07,   4.71], u: \"https://www.urosario.edu.co\", k: \"cp\" },\n\n    /* ── Ecuador ── */\n    { n: \"Facultad Latinoamericana de Ciencias Sociales (FLACSO Ecuador)\", c: \"Ecuador\", ll: [-78.49, -0.18], u: \"https://www.flacso.edu.ec\", k: \"p\" },\n\n    /* ── Estados Unidos ── */\n    { n: \"American University\",                                c: \"EE. UU.\",   ll: [-77.09,  38.94], u: \"https://www.american.edu\",  k: \"c\"  },\n    { n: \"Universidad de Syracuse\",                            c: \"EE. UU.\",   ll: [-76.14,  43.04], u: \"https://www.syracuse.edu\",  k: \"p\"  },\n\n    /* ── España ── */\n    { n: \"Universidad Autónoma de Madrid (UAM)\",               c: \"España\",    ll: [-3.69,  40.55], u: \"https://www.uam.es\",         k: \"c\"  },\n    { n: \"Universidad Autónoma de Barcelona (UAB)\",            c: \"España\",    ll: [ 2.10,  41.50], u: \"https://www.uab.cat\",        k: \"c\"  },\n    { n: \"Universidad Complutense de Madrid\",                  c: \"España\",    ll: [-3.72,  40.45], u: \"https://www.ucm.es\",         k: \"c\"  },\n    { n: \"Universidad de Salamanca\",                           c: \"España\",    ll: [-5.66,  40.96], u: \"https://www.usal.es\",        k: \"c\"  },\n    { n: \"Universidad Pompeu Fabra\",                           c: \"España\",    ll: [ 2.18,  41.39], u: \"https://www.upf.edu\",        k: \"c\"  },\n\n    /* ── Francia ── */\n    { n: \"Sciences Po · Lille\",                                c: \"Francia\",   ll: [ 3.06,  50.63], u: \"https://www.sciencespo-lille.eu\", k: \"c\"  },\n    { n: \"Sciences Po · Paris\",                                c: \"Francia\",   ll: [ 2.33,  48.85], u: \"https://www.sciencespo.fr\",  k: \"cp\" },\n    { n: \"Université Paris 1 Panthéon-Sorbonne\",               c: \"Francia\",   ll: [ 2.34,  48.85], u: \"https://www.pantheonsorbonne.fr\", k: \"c\"  },\n    { n: \"Université Paris 9 (Dauphine)\",                      c: \"Francia\",   ll: [ 2.30,  48.86], u: \"https://dauphine.psl.eu\",    k: \"c\"  },\n    { n: \"Université Paris 10 Nanterre\",                       c: \"Francia\",   ll: [ 2.21,  48.90], u: \"https://www.parisnanterre.fr\", k: \"cp\" },\n    { n: \"Sorbonne Nouvelle\",                                  c: \"Francia\",   ll: [ 2.36,  48.84], u: \"https://www.sorbonne-nouvelle.fr\", k: \"c\"  },\n\n    /* ── Grecia ── */\n    { n: \"Universidad Aristóteles de Tesalónica\",               c: \"Grecia\",    ll: [22.96,  40.63], u: \"https://www.auth.gr/en/\",    k: \"p\"  },\n\n    /* ── Hungría ── */\n    { n: \"Democracy Institute, Central European University\",    c: \"Hungría\",   ll: [19.05,  47.50], u: \"https://democracyinstitute.ceu.edu\", k: \"p\" },\n\n    /* ── México ── */\n    { n: \"CIDE – Centro de Investigación y Docencia Económicas\", c: \"México\", ll: [-99.27, 19.36], u: \"https://www.cide.edu\",       k: \"c\"  },\n    { n: \"Universidad Autónoma Metropolitana (UAM)\",           c: \"México\",    ll: [-99.18,  19.36], u: \"https://www.uam.mx\",        k: \"c\"  },\n\n    /* ── Países Bajos ── */\n    { n: \"Universidad de Ámsterdam\",                           c: \"Países Bajos\", ll: [ 4.89, 52.36], u: \"https://www.uva.nl\",         k: \"c\"  },\n    { n: \"Universidad de Leiden\",                              c: \"Países Bajos\", ll: [ 4.50, 52.16], u: \"https://www.universiteitleiden.nl\", k: \"c\"  },\n    { n: \"VU Amsterdam\",                                       c: \"Países Bajos\", ll: [ 4.86, 52.33], u: \"https://vu.nl\",              k: \"c\"  },\n\n    /* ── Perú ── */\n    { n: \"Pontificia Universidad Católica del Perú (PUCP)\",    c: \"Perú\",      ll: [-77.08, -12.07], u: \"https://www.pucp.edu.pe\",    k: \"c\"  },\n\n    /* ── Portugal ── */\n    { n: \"Universidade de Lisboa\",                             c: \"Portugal\",  ll: [ -9.16,  38.75], u: \"https://www.ulisboa.pt\",    k: \"p\"  },\n\n    /* ── Reino Unido ── */\n    { n: \"London School of Economics and Political Science (LSE)\", c: \"Reino Unido\", ll: [-0.12,  51.51], u: \"https://www.lse.ac.uk\", k: \"p\" },\n\n    /* ── Uruguay ── */\n    { n: \"Universidad Católica del Uruguay\",                   c: \"Uruguay\",   ll: [-56.16, -34.90], u: \"https://ucu.edu.uy\",         k: \"cp\" },\n  ];\n\n  function initMap(world) {\n    const W = 1100, H = 540;\n    const mapEl = document.getElementById('map');\n\n    const svg = d3.select('#map').append('svg')\n      .attr('viewBox', `0 0 ${W} ${H}`)\n      .attr('preserveAspectRatio', 'xMidYMid meet');\n\n    const proj = d3.geoNaturalEarth1()\n      .scale(178)\n      .translate([W / 2, H / 2 + 18]);\n    const pathGen = d3.geoPath().projection(proj);\n    const mapG = svg.append('g');\n\n    /* ── Base map layers ───────────────────────────────── */\n    mapG.append('path').datum({ type: 'Sphere' }).attr('class', 'map-sphere').attr('d', pathGen);\n    mapG.append('path').datum(d3.geoGraticule()()).attr('class', 'grat').attr('d', pathGen);\n    mapG.append('g').selectAll('path')\n      .data(topojson.feature(world, world.objects.countries).features)\n      .join('path')\n      .attr('class', 'map-land')\n      .attr('d', pathGen);\n\n    /* ── Country halos (subtle Mandy glow under cluster) ── */\n    const haloLayer = mapG.append('g').attr('class', 'halo-layer');\n    const byCountry = d3.group(DATA, d => d.c);\n    byCountry.forEach((items, country) => {\n      const lon = d3.mean(items, d => d.ll[0]);\n      const lat = d3.mean(items, d => d.ll[1]);\n      const [cx, cy] = proj([lon, lat]);\n      const r = Math.max(14, 8 + Math.sqrt(items.length) * 6);\n      haloLayer.append('circle')\n        .attr('class', 'halo')\n        .attr('cx', cx).attr('cy', cy).attr('r', r)\n        .attr('data-country', country);\n    });\n\n    /* ── Pin geometry ──────────────────────────────────── */\n    const PIN_PATH = \"M0,0 C-3.6,-5.2 -7.8,-8.8 -7.8,-14 C-7.8,-19.2 -4.4,-21.8 0,-21.8 C4.4,-21.8 7.8,-19.2 7.8,-14 C7.8,-8.8 3.6,-5.2 0,0Z\";\n\n    /* Cluster overlapping pins inside same country to a small ring */\n    function clusterOffsets(items) {\n      if (items.length === 1) return [[0, 0]];\n      const offsets = [];\n      const baseR = 11;\n      const ringR = baseR + Math.max(0, items.length - 6) * 1.2;\n      const step = (Math.PI * 2) / items.length;\n      for (let i = 0; i < items.length; i++) {\n        const a = -Math.PI / 2 + i * step;\n        offsets.push([Math.cos(a) * ringR, Math.sin(a) * ringR - 2]);\n      }\n      return offsets;\n    }\n\n    const pinLayer = mapG.append('g').attr('class', 'pin-layer');\n    const pinNodes = []; // {el, datum}\n\n    byCountry.forEach((items, country) => {\n      const offsets = clusterOffsets(items);\n      items.forEach((d, i) => {\n        const [bx, by] = proj(d.ll);\n        const [ox, oy] = offsets[i];\n        const px = bx + ox, py = by + oy;\n\n        const isC = d.k === 'c' || d.k === 'cp';\n        const isP = d.k === 'p' || d.k === 'cp';\n        const cls = d.k === 'cp' ? 'pin-g pin-both' : (isC ? 'pin-g pin-c' : 'pin-g pin-p');\n\n        const g = pinLayer.append('g')\n          .attr('class', cls)\n          .attr('data-c', isC ? '1' : '0')\n          .attr('data-p', isP ? '1' : '0')\n          .attr('transform', `translate(${px},${py})`);\n\n        g.append('path').attr('class', 'pb').attr('d', PIN_PATH);\n        g.append('circle').attr('class', 'pdot').attr('cy', -14.5).attr('r', 3);\n\n        g.on('mousemove', (e) => showTooltip(e, d, isC, isP))\n         .on('mouseleave', hideTooltip)\n         .on('click', (e) => {\n            e.stopPropagation();\n            if (d.u) window.open(d.u, '_blank', 'noopener');\n         });\n\n        pinNodes.push({ el: g.node(), c: isC, p: isP });\n      });\n    });\n\n    /* ── Zoom & pan ──────────────────────────────────────\n       Dynamic pin sizing is applied only when zoom settles.\n       This avoids per-frame re-scaling/jitter while still reducing\n       marker clutter in dense regions such as Europe. */\n    function clamp(n, min, max) {\n      return Math.max(min, Math.min(max, n));\n    }\n\n    function setPinScaleForZoom(k = 1) {\n      // Visual target: markers become smaller on screen as zoom increases.\n      // localScale compensates the parent map scale (k), then applies the target.\n      const zoomK = Math.max(1, k);\n      const screenFactor = clamp(1 - Math.log2(zoomK) * 0.12, 0.55, 1);\n      const localScale = screenFactor / zoomK;\n\n      pinLayer\n        .style('--pin-scale', localScale.toFixed(3))\n        .style('--pin-hover-scale', (localScale * 1.08).toFixed(3))\n        .style('--pin-dim-scale', (localScale * 0.6).toFixed(3));\n    }\n\n    setPinScaleForZoom(1);\n\n    const zoom = d3.zoom()\n      .scaleExtent([1, 14])\n      .on('zoom', ev => {\n        mapG.attr('transform', ev.transform);\n        svg.classed('grabbing', ev.transform.k > 1);\n      })\n      // D3 equivalent of Leaflet's \"zoomend\": run once after wheel/drag/button zoom.\n      .on('end', ev => setPinScaleForZoom(ev.transform.k));\n\n    svg.call(zoom).on('dblclick.zoom', null);\n\n    function zoomTo(ll, k) {\n      const [px, py] = proj(ll);\n      svg.transition().duration(700).call(\n        zoom.transform,\n        d3.zoomIdentity.translate(W / 2 - k * px, H / 2 - k * py).scale(k)\n      );\n    }\n\n    document.getElementById('btn-eu').onclick    = () => zoomTo([10, 50], 4.2);\n    document.getElementById('btn-na').onclick    = () => zoomTo([-95, 38], 3.0);\n    document.getElementById('btn-sa').onclick    = () => zoomTo([-62, -18], 2.8);\n    document.getElementById('btn-plus').onclick  = () => svg.transition().duration(280).call(zoom.scaleBy, 1.5);\n    document.getElementById('btn-minus').onclick = () => svg.transition().duration(280).call(zoom.scaleBy, 0.67);\n    document.getElementById('btn-reset').onclick = () => svg.transition().duration(700).call(zoom.transform, d3.zoomIdentity);\n\n    /* ── Tooltip ───────────────────────────────────────── */\n    const wrap = document.getElementById('wrap');\n    const tt   = document.getElementById('tt');\n\n    function ttPosition(e) {\n      const r = wrap.getBoundingClientRect();\n      let x = e.clientX - r.left + 16;\n      let y = e.clientY - r.top  - 18;\n      if (x + 280 > r.width)  x = e.clientX - r.left - 296;\n      if (y + 150 > r.height) y = e.clientY - r.top  - 160;\n      if (x < 8) x = 8; if (y < 8) y = 8;\n      return [x, y];\n    }\n    function showTooltip(e, d, isC, isP) {\n      document.getElementById('tn').textContent = d.n;\n      document.getElementById('tc').textContent = d.c;\n      document.getElementById('tgs').innerHTML =\n        (isC ? '<span class=\"tag tag-c\">Convenio<\/span>' : '') +\n        (isP ? '<span class=\"tag tag-p\">Pasantía<\/span>' : '');\n      const a = document.getElementById('tl');\n      if (d.u) {\n        a.href = d.u;\n        a.textContent = 'Visitar sitio →';\n        a.style.display = 'inline-flex';\n      } else { a.style.display = 'none'; }\n      const [x, y] = ttPosition(e);\n      tt.style.left = x + 'px';\n      tt.style.top  = y + 'px';\n      tt.style.display = 'block';\n    }\n    function hideTooltip() { tt.style.display = 'none'; }\n\n    /* ── Filter logic ──────────────────────────────────── */\n    const state = { c: true, p: true };\n    const fbtns = document.querySelectorAll('.fbtn');\n\n    function applyFilter() {\n      let visible = 0;\n      pinNodes.forEach(({ el, c, p }) => {\n        const show = (c && state.c) || (p && state.p);\n        el.classList.toggle('dim', !show);\n        if (show) visible++;\n      });\n      // dim halos when no pins of that country are visible\n      haloLayer.selectAll('.halo').each(function() {\n        const country = this.getAttribute('data-country');\n        const anyVisible = pinNodes.some(pn =>\n          DATA[Array.from(pinLayer.node().children).indexOf(pn.el)]?.c === country &&\n          ((pn.c && state.c) || (pn.p && state.p))\n        );\n        this.classList.toggle('dim', !anyVisible);\n      });\n      // simpler halo recompute via DATA grouping\n      haloLayer.selectAll('.halo').each(function() {\n        const country = this.getAttribute('data-country');\n        const items = DATA.filter(d => d.c === country);\n        const anyVisible = items.some(d => {\n          const isC = d.k === 'c' || d.k === 'cp';\n          const isP = d.k === 'p' || d.k === 'cp';\n          return (isC && state.c) || (isP && state.p);\n        });\n        this.classList.toggle('dim', !anyVisible);\n      });\n      document.getElementById('visible-count').textContent = visible;\n    }\n\n    fbtns.forEach(btn => {\n      btn.addEventListener('click', () => {\n        const k = btn.getAttribute('data-kind');\n        state[k] = !state[k];\n        btn.setAttribute('aria-pressed', state[k] ? 'true' : 'false');\n        applyFilter();\n        renderList();\n      });\n    });\n\n    /* ── Counters & stats ──────────────────────────────── */\n    const cCount = DATA.filter(d => d.k === 'c' || d.k === 'cp').length;\n    const pCount = DATA.filter(d => d.k === 'p' || d.k === 'cp').length;\n    const countries = new Set(DATA.map(d => d.c)).size;\n\n    document.getElementById('count-c').textContent = cCount;\n    document.getElementById('count-p').textContent = pCount;\n    document.getElementById('stat-countries').textContent = countries;\n    document.getElementById('stat-c').textContent = cCount;\n    document.getElementById('stat-p').textContent = pCount;\n    document.getElementById('stat-total').textContent = DATA.length;\n\n    /* ── Listado desplegable por país ───────────────────── */\n    const listEl = document.getElementById('inst-list');\n    function renderList() {\n      const groups = d3.group(\n        DATA.filter(d => {\n          const isC = d.k === 'c' || d.k === 'cp';\n          const isP = d.k === 'p' || d.k === 'cp';\n          return (isC && state.c) || (isP && state.p);\n        }),\n        d => d.c\n      );\n\n      if (groups.size === 0) {\n        listEl.innerHTML = '<div class=\"empty\">Sin instituciones para mostrar. Activá Convenios o Pasantías.<\/div>';\n        return;\n      }\n\n      const sorted = Array.from(groups.entries()).sort((a, b) => a[0].localeCompare(b[0], 'es'));\n      let html = '';\n      sorted.forEach(([country, items]) => {\n        html += `<div class=\"country-block\"><h3 class=\"country-name\">${country} <span class=\"cn-count\">${items.length}<\/span><\/h3><ul class=\"inst-ul\">`;\n        items.forEach(d => {\n          const isC = d.k === 'c' || d.k === 'cp';\n          const isP = d.k === 'p' || d.k === 'cp';\n          const tags =\n            (isC && state.c ? '<span class=\"tag tag-c\">Convenio<\/span>' : '') +\n            (isP && state.p ? '<span class=\"tag tag-p\">Pasantía<\/span>' : '');\n          html += `<li class=\"inst-li\"><a href=\"${d.u}\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"inst-link\">${d.n}<\/a><span class=\"inst-tags\">${tags}<\/span><\/li>`;\n        });\n        html += '<\/ul><\/div>';\n      });\n      listEl.innerHTML = html;\n    }\n\n    applyFilter();\n    renderList();\n\n    /* ── Hint chip auto-dismiss ────────────────────────── */\n    setTimeout(() => {\n      const h = document.getElementById('hint');\n      if (h) h.classList.add('hide');\n    }, 4200);\n  }\n})();\n<\/script>\n\n\n<\/body><\/html>"
  </script>
